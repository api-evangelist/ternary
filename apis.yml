apis:
  - aid: ternary:ternary-api
    name: Ternary API
    description: >-
      Ternary provides a REST API that exposes all platform capabilities
      programmatically. Customers can automate FinOps workflows, integrate cost
      data into CI/CD pipelines, trigger alerts based on spend thresholds, manage
      commitments, and generate reports. Authentication uses API keys generated
      from the platform.
