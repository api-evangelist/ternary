aid: ternary
name: Ternary
description: >-
  Ternary is a multi-cloud FinOps platform providing cost visibility, anomaly
  detection, commitment management, forecasting, and Kubernetes cost allocation
  for cloud environments. Originally built for Google Cloud, Ternary now
  supports AWS, Azure, and other cloud providers through its Universal Spend
  Ledger, with a REST API for programmatic access to all platform capabilities.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
