naftiko: "1.0.0-alpha1"

info:
  label: "Ternary API"
  description: >-
    Ternary is a multi-cloud FinOps platform REST API providing programmatic
    access to cost allocation, anomaly detection, commitment management,
    budgeting, forecasting, reporting, and Kubernetes cost allocation.
  tags:
    - Ternary
    - FinOps
    - Cloud Cost Management
    - Google Cloud
    - Multi-Cloud
    - Cost Optimization
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TERNARY_API_KEY: TERNARY_API_KEY

capability:
  consumes:
    - type: http
      namespace: ternary
      baseUri: "https://api.ternary.app"
      description: "Ternary FinOps platform REST API"
      authentication:
        type: apikey
        key: X-API-Key
        value: "{{env.TERNARY_API_KEY}}"
        placement: header
      resources:
        - name: cost-allocations
          path: /v1/cost-allocations
          description: "Cost allocation rules management"
          operations:
            - name: list-cost-allocations
              method: GET
              description: "Returns a list of cost allocation rules"
              inputParameters:
                - name: page_token
                  in: query
                  type: string
                  required: false
                  description: "Pagination token"
                - name: page_size
                  in: query
                  type: integer
                  required: false
                  description: "Number of results per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-cost-allocation
              method: POST
              description: "Creates a new cost allocation rule"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
                  allocation_type: "{{tools.allocation_type}}"
                  source_labels: "{{tools.source_labels}}"
                  target_cost_centers: "{{tools.target_cost_centers}}"
            - name: get-cost-allocation
              method: GET
              description: "Returns details of a specific cost allocation rule"
              inputParameters:
                - name: allocation_id
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the cost allocation rule"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-cost-allocation
              method: PUT
              description: "Updates an existing cost allocation rule"
              inputParameters:
                - name: allocation_id
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the cost allocation rule"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  allocation_type: "{{tools.allocation_type}}"
            - name: delete-cost-allocation
              method: DELETE
              description: "Deletes a cost allocation rule"
              inputParameters:
                - name: allocation_id
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the cost allocation rule"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: anomalies
          path: /v1/anomalies
          description: "Cloud cost anomaly detection"
          operations:
            - name: list-anomalies
              method: GET
              description: "Returns a list of detected cloud cost anomalies"
              inputParameters:
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by anomaly status"
                - name: cloud_provider
                  in: query
                  type: string
                  required: false
                  description: "Filter by cloud provider"
                - name: start_date
                  in: query
                  type: string
                  required: false
                  description: "Filter anomalies from this date"
                - name: end_date
                  in: query
                  type: string
                  required: false
                  description: "Filter anomalies up to this date"
                - name: page_token
                  in: query
                  type: string
                  required: false
                  description: "Pagination token"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-anomaly
              method: GET
              description: "Returns details of a specific cost anomaly"
              inputParameters:
                - name: anomaly_id
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the anomaly"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: acknowledge-anomaly
              method: POST
              description: "Marks an anomaly as acknowledged"
              inputParameters:
                - name: anomaly_id
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the anomaly"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  comment: "{{tools.comment}}"
        - name: commitments
          path: /v1/commitments
          description: "Cloud commitment management"
          operations:
            - name: list-commitments
              method: GET
              description: "Returns a list of cloud commitment purchases"
              inputParameters:
                - name: cloud_provider
                  in: query
                  type: string
                  required: false
                  description: "Filter by cloud provider"
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by commitment status"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-commitment
              method: GET
              description: "Returns details of a specific cloud commitment"
              inputParameters:
                - name: commitment_id
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the commitment"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: budgets
          path: /v1/budgets
          description: "Cloud cost budgets and forecasting"
          operations:
            - name: list-budgets
              method: GET
              description: "Returns a list of cloud cost budgets"
              inputParameters:
                - name: page_token
                  in: query
                  type: string
                  required: false
                  description: "Pagination token"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-budget
              method: POST
              description: "Creates a new cloud cost budget"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  amount: "{{tools.amount}}"
                  period: "{{tools.period}}"
                  alert_thresholds: "{{tools.alert_thresholds}}"
            - name: get-budget
              method: GET
              description: "Returns details of a specific budget"
              inputParameters:
                - name: budget_id
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the budget"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-budget
              method: PUT
              description: "Updates an existing cloud cost budget"
              inputParameters:
                - name: budget_id
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the budget"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  amount: "{{tools.amount}}"
            - name: delete-budget
              method: DELETE
              description: "Deletes a cloud cost budget"
              inputParameters:
                - name: budget_id
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the budget"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: reports
          path: /v1/reports
          description: "Cost reporting and analytics"
          operations:
            - name: list-reports
              method: GET
              description: "Returns a list of saved cost reports"
              inputParameters:
                - name: page_token
                  in: query
                  type: string
                  required: false
                  description: "Pagination token"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-report
              method: POST
              description: "Creates a new cost report"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  dimensions: "{{tools.dimensions}}"
                  filters: "{{tools.filters}}"
                  time_range: "{{tools.time_range}}"
            - name: run-report
              method: POST
              description: "Executes a saved report and returns cost data"
              inputParameters:
                - name: report_id
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the report"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  start_date: "{{tools.start_date}}"
                  end_date: "{{tools.end_date}}"
        - name: kubernetes
          path: /v1/kubernetes
          description: "Kubernetes cost allocation configuration"
          operations:
            - name: list-kubernetes-pod-labels
              method: GET
              description: "Returns Kubernetes pod label configuration for cost allocation"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-kubernetes-pod-labels
              method: PUT
              description: "Updates Kubernetes pod label configuration"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  labels: "{{tools.labels}}"

  exposes:
    - type: rest
      port: 8100
      namespace: ternary-api
      resources:
        - path: /v1/cost-allocations
          name: cost-allocations
          description: "List and manage cost allocation rules"
          operations:
            - method: GET
              name: list-cost-allocations
              description: "List cost allocation rules"
              call: "ternary.list-cost-allocations"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/anomalies
          name: anomalies
          description: "List detected cost anomalies"
          operations:
            - method: GET
              name: list-anomalies
              description: "List cloud cost anomalies"
              call: "ternary.list-anomalies"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/budgets
          name: budgets
          description: "List and manage budgets"
          operations:
            - method: GET
              name: list-budgets
              description: "List cloud cost budgets"
              call: "ternary.list-budgets"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/commitments
          name: commitments
          description: "List cloud commitments"
          operations:
            - method: GET
              name: list-commitments
              description: "List cloud commitment purchases"
              call: "ternary.list-commitments"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: ternary-mcp
      transport: http
      tools:
        - name: list-cost-allocations
          description: "List cost allocation rules in Ternary"
          hints:
            readOnly: true
            openWorld: false
          call: "ternary.list-cost-allocations"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-anomalies
          description: "List detected cloud cost anomalies"
          hints:
            readOnly: true
            openWorld: false
          call: "ternary.list-anomalies"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-budgets
          description: "List cloud cost budgets with current spend vs targets"
          hints:
            readOnly: true
            openWorld: false
          call: "ternary.list-budgets"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-commitments
          description: "List cloud commitment purchases"
          hints:
            readOnly: true
            openWorld: false
          call: "ternary.list-commitments"
          outputParameters:
            - type: object
              mapping: "$."
