naftiko: 1.0.0-alpha2
info:
  label: Ternary API — Forecasting
  description: 'Ternary API — Forecasting. 5 operations. Lead operation: List Budgets. Self-contained Naftiko capability covering
    one Ternary business surface.'
  tags:
  - Ternary
  - Forecasting
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TERNARY_API_KEY: TERNARY_API_KEY
capability:
  consumes:
  - type: http
    namespace: ternary-forecasting
    baseUri: https://api.ternary.app
    description: Ternary API — Forecasting business capability. Self-contained, no shared references.
    resources:
    - name: v1-budgets
      path: /v1/budgets
      operations:
      - name: listbudgets
        method: GET
        description: List Budgets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page_token
          in: query
          type: string
          description: Token for paginating through results
        - name: page_size
          in: query
          type: integer
          description: Number of results per page
      - name: createbudget
        method: POST
        description: Create Budget
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-budgets-budget_id
      path: /v1/budgets/{budget_id}
      operations:
      - name: getbudget
        method: GET
        description: Get Budget
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: budget_id
          in: path
          type: string
          description: The unique identifier of the budget
          required: true
      - name: updatebudget
        method: PUT
        description: Update Budget
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: budget_id
          in: path
          type: string
          description: The unique identifier of the budget
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletebudget
        method: DELETE
        description: Delete Budget
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: budget_id
          in: path
          type: string
          description: The unique identifier of the budget
          required: true
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.TERNARY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: ternary-forecasting-rest
    port: 8080
    description: REST adapter for Ternary API — Forecasting. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/budgets
      name: v1-budgets
      description: REST surface for v1-budgets.
      operations:
      - method: GET
        name: listbudgets
        description: List Budgets
        call: ternary-forecasting.listbudgets
        with:
          page_token: rest.page_token
          page_size: rest.page_size
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createbudget
        description: Create Budget
        call: ternary-forecasting.createbudget
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/budgets/{budget-id}
      name: v1-budgets-budget-id
      description: REST surface for v1-budgets-budget_id.
      operations:
      - method: GET
        name: getbudget
        description: Get Budget
        call: ternary-forecasting.getbudget
        with:
          budget_id: rest.budget_id
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatebudget
        description: Update Budget
        call: ternary-forecasting.updatebudget
        with:
          budget_id: rest.budget_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletebudget
        description: Delete Budget
        call: ternary-forecasting.deletebudget
        with:
          budget_id: rest.budget_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ternary-forecasting-mcp
    port: 9090
    transport: http
    description: MCP adapter for Ternary API — Forecasting. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-budgets
      description: List Budgets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ternary-forecasting.listbudgets
      with:
        page_token: tools.page_token
        page_size: tools.page_size
      outputParameters:
      - type: object
        mapping: $.
    - name: create-budget
      description: Create Budget
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: ternary-forecasting.createbudget
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-budget
      description: Get Budget
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ternary-forecasting.getbudget
      with:
        budget_id: tools.budget_id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-budget
      description: Update Budget
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: ternary-forecasting.updatebudget
      with:
        budget_id: tools.budget_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-budget
      description: Delete Budget
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: ternary-forecasting.deletebudget
      with:
        budget_id: tools.budget_id
      outputParameters:
      - type: object
        mapping: $.
